name: CLI Release

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view ${{ github.ref_name }} || gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: .exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev liblzma-dev pkg-config libglib2.0-dev libgtk-3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Build CLI
        shell: bash
        run: |
          cargo build --release -p mangofetch-cli --target ${{ matrix.target }}

      - name: Prepare Artifact
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          BINARY_NAME="mangofetch-cli-${{ matrix.target }}${{ matrix.suffix }}"
          cp target/${{ matrix.target }}/release/mangofetch${{ matrix.suffix }} ./$BINARY_NAME
          echo "ASSET=$BINARY_NAME" >> $GITHUB_ENV

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload ${{ github.ref_name }} ${{ env.ASSET }} --clobber

      - name: Calculate SHA256 (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Path ${{ env.ASSET }} -Algorithm SHA256).Hash.ToLower()
          echo "SHA256=$hash" >> $env:GITHUB_ENV

      - name: Update Installer Manifests (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $hash = "${{ env.SHA256 }}"
          
          # Update Scoop
          $scoopPath = "installers/scoop/mangofetch.json"
          $scoop = Get-Content $scoopPath | ConvertFrom-Json
          $scoop.version = $version
          $scoop.architecture.64bit.hash = $hash
          $scoop.architecture.64bit.url = "https://github.com/julesklord/mangofetch-cli/releases/download/${{ github.ref_name }}/mangofetch-cli-x86_64-pc-windows-msvc.exe#/mangofetch.exe"
          $scoop | ConvertTo-Json -Depth 10 | Set-Content $scoopPath

          # Update Winget
          $wingetPath = "installers/winget/julesklord.mangofetch.yaml"
          (Get-Content $wingetPath) -replace 'PackageVersion: .*', "PackageVersion: $version" `
                                    -replace 'InstallerSha256: .*', "InstallerSha256: $hash" `
                                    -replace 'InstallerUrl: .*', "InstallerUrl: https://github.com/julesklord/mangofetch-cli/releases/download/${{ github.ref_name }}/mangofetch-cli-x86_64-pc-windows-msvc.exe" | Set-Content $wingetPath

      - name: Commit manifest updates
        if: matrix.os == 'windows-latest'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add installers/
          git commit -m "chore: update installer manifests for ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin main

  publish-crates:
    name: Publish to Crates.io
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Publish mangofetch-plugin-sdk
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mangofetch-plugin-sdk
      - name: Wait for SDK index
        run: sleep 30
      - name: Publish mangofetch-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mangofetch-core
      - name: Wait for core index
        run: sleep 30
      - name: Publish mangofetch-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mangofetch-cli

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <header class="header">
      <div class="header-left">
        <img src="../icons/active-16.png" alt="" class="logo">
        <span class="title">OmniGet</span>
      </div>
      <div class="header-toggles">
        <label class="toggle-group" title="Open app when downloading">
          <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 3h6v6"/>
            <path d="M10 14 21 3"/>
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          </svg>
          <span class="toggle">
            <input type="checkbox" id="open-app-toggle" role="switch" aria-label="Open app when downloading">
            <span class="toggle-slider"></span>
          </span>
        </label>
        <label class="toggle-group" title="Media detection">
          <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
            <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
            <line x1="12" y1="20" x2="12.01" y2="20"/>
          </svg>
          <span class="toggle">
            <input type="checkbox" id="sniffer-toggle" role="switch" aria-label="Media detection">
            <span class="toggle-slider"></span>
          </span>
        </label>
      </div>
    </header>
    <div id="content" class="content">
      <div class="state-empty">
        <div class="listening-dot"></div>
      </div>
    </div>
    <div class="cookie-capture" id="cookie-capture">
      <button type="button" class="cookie-btn" id="cookie-capture-btn">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21.598 11.064a1.006 1.006 0 0 0-.854-.172A2.94 2.94 0 0 1 17.92 8.36a1 1 0 0 0-.85-.85 2.94 2.94 0 0 1-2.532-2.825 1 1 0 0 0-.85-.99 9.65 9.65 0 0 0-2.49-.005A10 10 0 0 0 12 22a10 10 0 0 0 9.834-9.745z"/>
          <path d="M8 13a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-1 5a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm6 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm3-3a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3-6a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/>
        </svg>
        <span class="cookie-btn-label" id="cookie-capture-label">Save site cookies</span>
      </button>
      <p class="cookie-hint" id="cookie-capture-hint">Sends cookies of this site to OmniGet's cookie manager.</p>
    </div>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
